  <style rel="stylesheet" crossorigin>:root{--bg-color: #FDF6F5;--text-primary: #5A4E4D;--text-secondary: #8A7A78;--accent-color: #FF9E9E;--wound-color: #E27D80;--wound-glow: rgba(226, 125, 128, .4);--drop-active: rgba(162, 210, 255, .4)}*{margin:0;padding:0;box-sizing:border-box}body{font-family:Quicksand,sans-serif;background-color:var(--bg-color);color:var(--text-primary);display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden}#app{width:100%;max-width:500px;height:100vh;display:flex;flex-direction:column;position:relative;box-shadow:0 0 50px #0000000d;background:#fff;border-radius:20px}@media(min-width:501px){#app{height:90vh;margin:20px}}.header{text-align:center;padding:30px 20px 10px;z-index:10}.title{font-size:1.8rem;font-weight:700;color:var(--accent-color);margin-bottom:8px}.subtitle{font-size:1rem;color:var(--text-secondary);line-height:1.4}.game-area{flex:1;display:flex;justify-content:center;align-items:center;position:relative}.character-container{width:250px;height:250px;position:relative;animation:float 6s ease-in-out infinite}@keyframes float{0%{transform:translateY(0)}50%{transform:translateY(-10px)}to{transform:translateY(0)}}.realistic-nose{width:100%;height:100%;object-fit:cover;border-radius:15px;box-shadow:0 4px 15px #0000001a;transition:all .5s ease}.tear{animation:tearDrop 2s infinite;opacity:0}#tear2{animation-delay:1s}@keyframes tearDrop{0%{transform:translateY(0);opacity:0}20%{opacity:1}80%{transform:translateY(20px);opacity:0}to{transform:translateY(20px);opacity:0}}.target-zone{position:absolute;width:60px;height:30px;margin-left:-30px;margin-top:-15px;display:flex;justify-content:center;align-items:center;border-radius:20px;border:2px dashed transparent;transition:all .3s ease;z-index:5}.target-zone.active{border-color:#a2d2ff;background-color:var(--drop-active);transform:scale(1.1)}.wound-mark{width:20px;height:6px;background-color:var(--wound-color);border-radius:10px;box-shadow:0 0 8px var(--wound-glow);transform:rotate(-15deg)}.target-zone.healed .wound-mark{display:none}.placed-band-aid{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) rotate(-15deg) scale(0);width:60px;animation:popIn .4s cubic-bezier(.175,.885,.32,1.275) forwards;pointer-events:none}@keyframes popIn{0%{transform:translate(-50%,-50%) rotate(-15deg) scale(0)}to{transform:translate(-50%,-50%) rotate(-15deg) scale(1.2)}}#message-container{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:20}.floating-msg{position:absolute;background:#fff;padding:8px 15px;border-radius:20px;font-size:.9rem;font-weight:600;color:var(--accent-color);box-shadow:0 5px 15px #ff9e9e4d;animation:floatUpMsg 2s ease-out forwards;opacity:0}@keyframes floatUpMsg{0%{transform:translateY(0) scale(.8);opacity:0}20%{transform:translateY(-20px) scale(1.1);opacity:1}80%{transform:translateY(-40px) scale(1);opacity:1}to{transform:translateY(-50px) scale(.9);opacity:0}}.inventory{padding:20px;background:linear-gradient(to top,rgba(255,224,210,.5),transparent);border-bottom-left-radius:20px;border-bottom-right-radius:20px}.instruction{text-align:center;font-weight:600;margin-bottom:15px;color:var(--accent-color)}.band-aids-container{display:flex;justify-content:space-around;align-items:center;height:60px}.band-aid{width:80px;cursor:grab;transition:transform .2s;touch-action:none}.band-aid:active{cursor:grabbing;transform:scale(1.1)}.band-aid.dragging{opacity:.5}.band-aid.used{visibility:hidden}.success-overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:#ffffffe6;-webkit-backdrop-filter:blur(5px);backdrop-filter:blur(5px);display:flex;justify-content:center;align-items:center;z-index:100;opacity:0;pointer-events:none;transition:opacity .5s ease;border-radius:20px}.success-overlay.show{opacity:1;pointer-events:auto}.success-content{text-align:center;padding:30px;transform:scale(.8);transition:transform .5s cubic-bezier(.175,.885,.32,1.275)}.success-overlay.show .suc <body>
  <div id="app">

    <!-- Başlık ve Mesajlar -->
    <header class="header">
      <h1 class="title">Yanlışlıkla oldu, çok özür dilerim! 🥺</h1>
      <p class="subtitle">Seni çok seviyorum ve çok özür dilerim. Lütfen yaraları iyileştirir misin?</p>
    </header>

    <!-- Oyun Alanı: Ortadaki Burun / Surat Kısmı -->
    <main class="game-area">
      <div class="character-container" id="character-container">
        <!-- Custom Photo Nose (Using Direct URL) -->
        <img src="https://raw.githubusercontent.com/umuttanhediyeler/nose-rep/main/Ads%C4%B1z%20tasar%C4%B1m-6.png"
          alt="Yaralı Burun" class="realistic-nose photo-nose" />

        <!-- Drop Zonları (Yara yerleri) -->
        <!-- Burnun etrafında 3 adet hedef nokta belirleyeceğiz -->
        <div class="wound target-zone" data-id="1" style="top: 50%; left: 40%;">
          <div class="wound-mark"></div>
        </div>
        <div class="wound target-zone" data-id="2" style="top: 55%; left: 50%;">
          <div class="wound-mark"></div>
        </div>
        <div class="wound target-zone" data-id="3" style="top: 50%; left: 60%;">
          <div class="wound-mark"></div>
        </div>

        <!-- Yüzen Tatlı Mesajlar için Container -->
        <div id="message-container"></div>
      </div>
    </main>

    <!-- Buzlar Listesi (Drag Items) -->
    <footer class="inventory">
      <p class="instruction">Buzları sürükle ve iyileştir! 🧊✨</p>
      <div class="band-aids-container ice-cubes-container">
        <!-- 1. Buz -->
        <div class="band-aid draggable" draggable="true" data-id="1">
          <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <rect x="15" y="15" width="70" height="70" rx="15" fill="#BDE0FE" opacity="0.8" />
            <rect x="25" y="25" width="50" height="50" rx="10" fill="#A2D2FF" />
            <polygon points="25,45 25,25 45,25" fill="#FFFFFF" opacity="0.7" />
            <polygon points="75,55 75,75 55,75" fill="#FFFFFF" opacity="0.4" />
            <rect x="35" y="45" width="30" height="20" fill="#FFFFFF" opacity="0.3" rx="5" />
          </svg>
        </div>
        <!-- 2. Buz -->
        <div class="band-aid draggable" draggable="true" data-id="2">
          <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <rect x="15" y="15" width="70" height="70" rx="15" fill="#BDE0FE" opacity="0.8" />
            <rect x="25" y="25" width="50" height="50" rx="10" fill="#A2D2FF" />
            <polygon points="25,45 25,25 45,25" fill="#FFFFFF" opacity="0.7" />
            <polygon points="75,55 75,75 55,75" fill="#FFFFFF" opacity="0.4" />
            <rect x="35" y="45" width="30" height="20" fill="#FFFFFF" opacity="0.3" rx="5" />
          </svg>
        </div>
        <!-- 3. Buz -->
        <div class="band-aid draggable" draggable="true" data-id="3">
          <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <rect x="15" y="15" width="70" height="70" rx="15" fill="#BDE0FE" opacity="0.8" />
            <rect x="25" y="25" width="50" height="50" rx="10" fill="#A2D2FF" />
            <polygon points="25,45 25,25 45,25" fill="#FFFFFF" opacity="0.7" />
            <polygon points="75,55 75,75 55,75" fill="#FFFFFF" opacity="0.4" />
            <rect x="35" y="45" width="30" height="20" fill="#FFFFFF" opacity="0.3" rx="5" />
          </svg>
        </div>
      </div>
    </footer>

    <!-- Final Kazandı Ekranı Overlay -->
    <div class="success-overlay" id="success-overlay">
      <div class="success-content">
        <h2 class="glow-text">Yuppi! İyileştin! 🎉</h2>
        <p>Kafam biraz sert olabilir ama kalbim pamuk gibi. Seni çok ama çok seviyorum! Lütfen beni affet! 💖</p>
        <div class="hearts-container" id="hearts-container"></div>
        <button id="restart-btn" class="glass-btn">Tekrar Oyna / İyileştir</button>
      </div>
    </div>

  </div>
</body>

</html>
